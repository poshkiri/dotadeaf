<!doctype html>

    <meta name="theme-color" content="#F5C518" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;

        color: #fafafa;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;

      .card {
